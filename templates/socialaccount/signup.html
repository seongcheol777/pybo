{% extends 'base.html' %}
{% block content %}
<div class="container my-3">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h3 class="border-bottom pb-2 mb-4">소셜 계정으로 회원가입</h3>
            <p class="text-muted">
                소셜 계정 정보를 사용해 가입을 완료합니다.<br>
                아래 정보를 확인하고 저장하기를 클릭하세요.
            </p>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary">저장하기</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
