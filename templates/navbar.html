<!-- 내비게이션바 -->
<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
    <a class="navbar-brand" href="{% url 'pybo:index' %}">Py<span>bo</span></a>
    <button class="navbar-toggler ml-auto" type="button" data-toggle="collapse"
            data-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse flex-grow-0" id="navbarNav">
        <ul class="navbar-nav">
            {% if user.is_authenticated %}
            <li class="nav-item">
                <a class="nav-link" href="{% url 'pybo:mypage' %}">{{ user.username }}</a>
            </li>
            <li class="nav-item">
                <a class="nav-link position-relative" href="{% url 'pybo:notification_list' %}">
                    알림
                    {% if unread_notification_count > 0 %}
                    <span class="badge badge-danger"
                          style="position:absolute;top:4px;right:-4px;font-size:0.65rem;">
                        {{ unread_notification_count }}
                    </span>
                    {% endif %}
                </a>
            </li>
            <li class="nav-item">
                <form method="post" action="{% url 'common:logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link nav-link">로그아웃</button>
                </form>
            </li>
            {% else %}
            <li class="nav-item">
                <a class="nav-link" href="{% url 'common:login' %}">로그인</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'common:signup' %}">회원가입</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'google_login' %}">Google 로그인</a>
            </li>
            {% endif %}
        </ul>
    </div>
</nav>
